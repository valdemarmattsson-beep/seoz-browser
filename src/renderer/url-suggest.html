<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>SEOZ URL suggest</title>
<style>
  /* Transparent root — only the .panel paints. The view is sized to
     match the URL bar's width and the requested item-list height. */
  html, body {
    margin: 0; padding: 0; background: transparent; overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-user-select: none; user-select: none;
    color: #f8f8f8;
  }

  .panel {
    background: #1a1d23;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    margin: 0 4px 4px;            /* leave room for shadow on sides + bottom */
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
    padding: 4px 0;
  }

  .item {
    padding: 6px 12px;
    display: flex; align-items: center; gap: 9px;
    cursor: pointer;
    transition: background .1s;
  }
  .item:hover, .item.sel {
    background: rgba(255,255,255,.06);
  }
  .item img {
    width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0;
  }
  .info { flex: 1; min-width: 0 }
  .title {
    font-size: 11.5px; color: #f8f8f8;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .url {
    font-size: 10px; color: rgba(255,255,255,.5);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .match { color: #4680FF; font-weight: 600 }

  /* Custom scrollbar to blend with dark theme */
  .panel::-webkit-scrollbar { width: 6px }
  .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px }
  .panel::-webkit-scrollbar-track { background: transparent }
</style>
</head>
<body>
<div class="panel" id="panel"></div>
<script>
  // ──────────────────────────────────────────────────────────────────
  //  URL suggest renderer
  //
  //  Receives a fully-rendered list (chrome computes matches because
  //  the history data + match logic live there) plus a selection
  //  index. Emits 'pick' on click and 'hover' on mouseover (chrome
  //  uses the latter to update keyboard-selection state).
  // ──────────────────────────────────────────────────────────────────
  const $ = (id) => document.getElementById(id)
  const panel = $('panel')

  function escHTML(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
  }

  // Highlight the query inside a string. Done in the popup renderer so
  // we never have to ship raw HTML across IPC.
  function highlight(text, query) {
    if (!query) return escHTML(text)
    const i = String(text || '').toLowerCase().indexOf(String(query).toLowerCase())
    if (i === -1) return escHTML(text)
    const t = String(text)
    return escHTML(t.slice(0, i)) +
           '<span class="match">' + escHTML(t.slice(i, i + query.length)) + '</span>' +
           escHTML(t.slice(i + query.length))
  }

  let _items = []
  let _selIdx = -1

  function render() {
    panel.innerHTML = _items.map((h, i) => {
      const fav = h.favicon ? `<img src="${escHTML(h.favicon)}" onerror="this.style.display='none'">` : '<span style="width:14px;flex-shrink:0"></span>'
      return `<div class="item ${i === _selIdx ? 'sel' : ''}" data-i="${i}">
        ${fav}
        <div class="info">
          <div class="title">${highlight(h.title || '', h._q || '')}</div>
          <div class="url">${highlight(h.url || '', h._q || '')}</div>
        </div>
      </div>`
    }).join('')
    // Tell main how tall we ended up so it can resize the view.
    requestAnimationFrame(() => {
      const r = panel.getBoundingClientRect()
      if (window.seoz?.urlSuggest?.requestResize) {
        window.seoz.urlSuggest.requestResize(Math.ceil(r.height + 8))
      }
    })
  }

  function updateSelHighlight() {
    panel.querySelectorAll('.item').forEach((el, i) => {
      el.classList.toggle('sel', i === _selIdx)
    })
    if (_selIdx >= 0) {
      const el = panel.querySelectorAll('.item')[_selIdx]
      if (el) el.scrollIntoView({ block: 'nearest' })
    }
  }

  // Click → pick. mousedown so we fire before the URL input's blur
  // event hides us (chrome uses 150ms blur-then-hide grace).
  panel.addEventListener('mousedown', (e) => {
    e.preventDefault()  // don't steal focus from URL input
    const item = e.target.closest && e.target.closest('.item')
    if (!item) return
    const i = Number(item.dataset.i)
    const h = _items[i]
    if (h && h.url && window.seoz?.urlSuggest?.pick) {
      window.seoz.urlSuggest.pick(h.url)
    }
  })

  // Hover → tell chrome to update selIdx so keyboard nav stays in sync.
  panel.addEventListener('mouseover', (e) => {
    const item = e.target.closest && e.target.closest('.item')
    if (!item) return
    const i = Number(item.dataset.i)
    if (i !== _selIdx && window.seoz?.urlSuggest?.hover) {
      window.seoz.urlSuggest.hover(i)
    }
  })

  if (window.seoz?.urlSuggest?.onSetItems) {
    window.seoz.urlSuggest.onSetItems(({ items, selIdx, query }) => {
      _items = (items || []).map(h => ({ ...h, _q: query || '' }))
      _selIdx = typeof selIdx === 'number' ? selIdx : -1
      render()
    })
  }
  if (window.seoz?.urlSuggest?.onSetSel) {
    window.seoz.urlSuggest.onSetSel((idx) => {
      _selIdx = typeof idx === 'number' ? idx : -1
      updateSelHighlight()
    })
  }
</script>
</body>
</html>
