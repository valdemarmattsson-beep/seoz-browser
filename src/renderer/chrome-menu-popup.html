<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self' 'unsafe-inline'">
<title>SEOZ Menu</title>
<style>
  /* Hardcoded tokens — popup is a sibling WebContentsView with no
     access to the chrome renderer's :root vars. Kept in lockstep with
     index.html's --card / --border / --txt / etc. for dark theme.
     A second [data-theme="light"] block below covers the inverse so
     theme switches via 'chrome-menu:items' { isDark } work seamlessly. */
  :root {
    --card: #20242c;
    --panel: #1a1d24;
    --border: rgba(255,255,255,.08);
    --txt: rgba(255,255,255,.88);
    --head: rgba(255,255,255,.98);
    --muted: rgba(255,255,255,.42);
    --ink-2: rgba(255,255,255,.62);
    --hover: rgba(255,255,255,.06);
    --p: #4680ff;
  }
  [data-theme="light"] {
    --card: #ffffff;
    --panel: #f5f5f3;
    --border: rgba(0,0,0,.08);
    --txt: #1a1a1a;
    --head: #0a0a0a;
    --muted: #8a8a85;
    --ink-2: #585854;
    --hover: rgba(0,0,0,.04);
    --p: #3b6fe0;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: transparent;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px; color: var(--txt);
    overflow: hidden; user-select: none;
  }
  /* Body has no padding — earlier 4px pad created a transparent halo
     around the card that bled in whatever was under the WebContentsView.
     View bounds now match the card exactly; only the rounded-corner
     triangles remain transparent. */

  .menu {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 0;
    /* No box-shadow — would be clipped at view bounds since the body
       has no padding to give it room. Border + card-vs-page contrast
       is enough separation. */
    min-width: 230px;
    width: max-content;
  }

  .item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 14px; cursor: pointer;
    transition: background .12s;
  }
  .item:hover { background: var(--hover); }
  .item .icon {
    width: 20px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
  }
  .item .icon svg { width: 15px; height: 15px; }
  .item .label { flex: 1; font-weight: 500; color: var(--txt); }
  .item .shortcut {
    font-size: 10px; color: var(--muted);
    font-family: 'Inter', sans-serif;
  }

  .sep { height: 1px; background: var(--border); margin: 4px 10px; }

  .zoom-row {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 14px;
  }
  .zoom-row .icon {
    width: 20px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
  }
  .zoom-row .icon svg { width: 15px; height: 15px; }
  .zoom-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--txt); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; padding: 0;
    transition: background .12s, border-color .12s;
  }
  .zoom-btn:hover { background: var(--hover); }
  .zoom-btn svg { width: 12px; height: 12px; }
  .zoom-label {
    flex: 1; text-align: center;
    font-weight: 600; font-size: 12px; color: var(--head);
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
  <div class="menu" id="menu"></div>
  <script>
    'use strict'

    const menuEl = document.getElementById('menu')
    let _items = []
    let _zoomLevel = 100

    // Reset icon for the zoom row's "back to 100%" button.
    const RESET_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>'
    const ZOOM_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>'

    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
    }

    function render() {
      const html = _items.map(it => {
        if (it.kind === 'sep') return '<div class="sep"></div>'
        if (it.kind === 'zoom') {
          // Use server-supplied icon if present, otherwise the default
          // magnifier-with-plus the in-DOM menu used to show.
          const icon = it.icon || ZOOM_ICON_SVG
          return [
            '<div class="zoom-row">',
              '<span class="icon">', icon, '</span>',
              '<button class="zoom-btn" data-action="zoom-out" aria-label="Zooma ut">−</button>',
              '<span class="zoom-label">', _zoomLevel, '%</span>',
              '<button class="zoom-btn" data-action="zoom-in"  aria-label="Zooma in">+</button>',
              '<button class="zoom-btn" data-action="zoom-reset" style="margin-left:4px" aria-label="Återställ zoom">', RESET_SVG, '</button>',
            '</div>',
          ].join('')
        }
        // Regular item — icon HTML is trusted (sourced from chrome
        // renderer, all SVG strings produced by the lc() helper).
        return [
          '<div class="item" data-action="', escHtml(it.id), '">',
            '<span class="icon">', it.icon || '', '</span>',
            '<span class="label">', escHtml(it.label), '</span>',
            it.shortcut ? '<span class="shortcut">' + escHtml(it.shortcut) + '</span>' : '',
          '</div>',
        ].join('')
      }).join('')
      menuEl.innerHTML = html
      // Body has no padding — view bounds match the card exactly so
      // there's no transparent halo around the rounded corners.
      requestAnimationFrame(() => {
        const w = menuEl.offsetWidth
        const h = menuEl.offsetHeight
        try { window.seoz?.chromeMenu?.resize(w, h) } catch (_) {}
      })
    }

    // Intercepts ALL clicks inside the menu. Single delegate keeps
    // wire-up simple — items have data-action="<id>", zoom buttons too.
    document.addEventListener('click', (e) => {
      const target = e.target.closest('[data-action]')
      if (!target) return
      const id = target.dataset.action
      try { window.seoz?.chromeMenu?.action(id) } catch (_) {}
    })

    // Esc / blur → close. Main also hides on click-outside but the
    // popup itself catching Esc is cheaper than asking main every time.
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        try { window.seoz?.chromeMenu?.close() } catch (_) {}
      }
    })
    window.addEventListener('blur', () => {
      try { window.seoz?.chromeMenu?.close() } catch (_) {}
    })

    // Receive items + state from main (chrome renderer pushed them).
    if (window.seoz?.chromeMenu?.onItems) {
      window.seoz.chromeMenu.onItems((payload) => {
        _items = Array.isArray(payload.items) ? payload.items : []
        if (typeof payload.zoomLevel === 'number') _zoomLevel = payload.zoomLevel
        document.documentElement.dataset.theme = payload.isDark === false ? 'light' : 'dark'
        render()
      })
    }
  </script>
</body>
</html>
