<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>SEOZ chrome label</title>
<style>
  /* Transparent root — only the .label paints. The view is sized to
     hug the label tight so it doesn't intercept clicks anywhere else. */
  html, body {
    margin: 0; padding: 0; background: transparent; overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-user-select: none; user-select: none;
    pointer-events: none;
  }
  .label {
    display: inline-block;
    background: #f0f4f8;        /* matches --head light value */
    color: #131920;             /* matches --bg dark inverse */
    font-size: 10px; font-weight: 600;
    padding: 4px 9px; border-radius: 5px;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
    margin: 4px 8px 4px 4px;    /* leave room for the right-side arrow */
    position: relative;
  }
  /* Arrow pointing right (toward the dock icon on the right side). */
  .label::after {
    content: ''; position: absolute;
    left: 100%; top: 50%; transform: translateY(-50%);
    border: 4px solid transparent; border-left-color: #f0f4f8;
  }
</style>
</head>
<body>
<span class="label" id="label"></span>
<script>
  const el = document.getElementById('label')
  if (window.seoz?.chromeLabel?.onUpdate) {
    window.seoz.chromeLabel.onUpdate((text) => {
      el.textContent = String(text || '')
      requestAnimationFrame(() => {
        const r = el.getBoundingClientRect()
        if (window.seoz?.chromeLabel?.requestResize) {
          // +12 width for arrow + margin, +8 height for shadow breathing
          window.seoz.chromeLabel.requestResize(Math.ceil(r.width + 16), Math.ceil(r.height + 8))
        }
      })
    })
  }
</script>
</body>
</html>
